<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>培训视频中心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: #f5f7fa;
            color: #1a1a2e;
            padding: 30px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 16px;
            padding: 40px 35px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        .header h1 {
            font-size: 30px;
            font-weight: 700;
            color: #1a1a2e;
        }

        .header p {
            color: #666;
            font-size: 16px;
            margin-top: 8px;
        }

        .header .badge {
            display: inline-block;
            background: #eef2ff;
            color: #4f46e5;
            font-size: 13px;
            padding: 4px 14px;
            border-radius: 20px;
            margin-top: 10px;
            font-weight: 500;
        }

        .tabs {
            display: flex;
            gap: 6px;
            background: #f1f3f5;
            padding: 5px;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            background: transparent;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            color: #666;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .tab-btn:hover {
            color: #1a1a2e;
        }

        .tab-btn.active {
            background: #ffffff;
            color: #1a1a2e;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .video-wrapper {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .video-wrapper.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .video-box {
            background: #0a0a0a;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }

        .video-box iframe {
            width: 100%;
            height: 460px;
            border: none;
            display: block;
        }

        .video-info {
            margin-top: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .video-info .label {
            font-weight: 600;
            font-size: 15px;
            color: #1a1a2e;
        }

        .video-info .label span {
            color: #4f46e5;
        }

        .video-info .note {
            color: #888;
            font-size: 14px;
        }

        .backup-link {
            color: #4f46e5;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        .backup-link:hover {
            text-decoration: underline;
        }

        .footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            text-align: center;
            font-size: 14px;
            color: #999;
        }

        .footer a {
            color: #4f46e5;
            text-decoration: none;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px 16px;
            }

            .header h1 {
                font-size: 22px;
            }

            .video-box iframe {
                height: 220px;
            }

            .tab-btn {
                font-size: 13px;
                padding: 10px 12px;
            }

            .video-info {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <div class="header">
            <h1>📹 培训视频中心</h1>
            <p>选择语言版本观看对应培训内容</p>
            <span class="badge">双语支持 · 中 / EN</span>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-lang="cn">🇨🇳 中文版</button>
            <button class="tab-btn" data-lang="en">🇬🇧 English</button>
        </div>

        <div class="video-wrapper active" id="video-cn">
            <div class="video-box">
                <iframe 
                    src="https://player.bilibili.com/player.html?bvid=BV135HDzaEPt&high_quality=1&autoplay=0&page=1"
                    allowfullscreen>
                </iframe>
            </div>
            <div class="video-info">
                <div class="label">📌 <span>中文</span> 培训</div>
                <div class="note">推荐中国大陆用户观看</div>
                <a href="https://www.bilibili.com/video/BV135HDzaEPt" target="_blank" class="backup-link">
                    🔗 备用链接：去 B站 观看 →
                </a>
            </div>
        </div>

        <div class="video-wrapper" id="video-en">
            <div class="video-box">
                <iframe 
                    src="https://www.youtube.com/embed/YraoC4LOOwU?autoplay=0&rel=0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                    allowfullscreen>
                </iframe>
            </div>
            <div class="video-info">
                <div class="label">📌 <span>English</span> Training</div>
                <div class="note">Recommended for overseas users</div>
                <a href="https://www.youtube.com/watch?v=YraoC4LOOwU" target="_blank" class="backup-link">
                    🔗 Backup: Watch on YouTube →
                </a>
            </div>
        </div>

        <div class="footer">
            部署于 <a href="https://pages.github.com" target="_blank">GitHub Pages</a>
            &nbsp;·&nbsp; 2026
        </div>

    </div>

    <script>
        const tabs = document.querySelectorAll('.tab-btn');

        tabs.forEach(btn => {
            btn.addEventListener('click', function() {
                tabs.forEach(b => b.classList.remove('active'));
                this.classList.add('active');

                document.querySelectorAll('.video-wrapper').forEach(w => {
                    w.classList.remove('active');
                });

                const lang = this.getAttribute('data-lang');
                document.getElementById('video-' + lang).classList.add('active');
            });
        });
    </script>

</body>
</html>
